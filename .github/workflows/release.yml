name: Release

on:
  push:
    branches: [master]
    paths:
      - "portable/version.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version
        id: version
        run: |
          VERSION=$(cat portable/version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git tag -l "v$VERSION" | grep -q "v$VERSION"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.skip == 'false'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.version.outputs.skip == 'false'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        if: steps.version.outputs.skip == 'false'
        with:
          go-version: "1.24"
          cache: false

      - name: Build UI
        if: steps.version.outputs.skip == 'false'
        working-directory: ui
        run: |
          pnpm install
          pnpm build
          mkdir -p ../portable/app/ui/dist
          cp -R dist/* ../portable/app/ui/dist/

      - name: Download Node.js runtimes
        if: steps.version.outputs.skip == 'false'
        run: |
          NODE_VER="v22.14.0"
          mkdir -p portable/app/runtime

          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-darwin-arm64.tar.xz" | tar -xJ
          mv "node-$NODE_VER-darwin-arm64" portable/app/runtime/node-darwin-arm64

          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-darwin-x64.tar.xz" | tar -xJ
          mv "node-$NODE_VER-darwin-x64" portable/app/runtime/node-darwin-x64

          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-win-x64.zip" -o node-win.zip
          unzip -q node-win.zip
          mv "node-$NODE_VER-win-x64" portable/app/runtime/node-win-x64

          echo "Runtimes downloaded:"
          du -sh portable/app/runtime/*/

      - name: Install OpenClaw
        if: steps.version.outputs.skip == 'false'
        run: |
          mkdir -p portable/app/core
          cd portable/app/core
          npm init -y
          npm install openclaw
          echo "OpenClaw installed: $(du -sh node_modules/)"

      - name: Build launchers
        if: steps.version.outputs.skip == 'false'
        working-directory: launcher
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o "../portable/启动 PocketClaw.exe" main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o "../portable/启动 PocketClaw.app/Contents/MacOS/PocketClaw-arm64" main.go
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o "../portable/启动 PocketClaw.app/Contents/MacOS/PocketClaw-x64" main.go

          chmod +x "../portable/启动 PocketClaw.app/Contents/MacOS/launcher"
          chmod +x "../portable/启动 PocketClaw.app/Contents/MacOS/PocketClaw-arm64"
          chmod +x "../portable/启动 PocketClaw.app/Contents/MacOS/PocketClaw-x64"

      - name: Create packages
        if: steps.version.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EXCL="--exclude=portable/data/.openclaw/credentials --exclude=portable/data/memory/*.md --exclude=portable/data/backups/*"

          # Full package: all runtimes + OpenClaw + UI + launchers
          tar -czf "PocketClaw-v${VERSION}-full.tar.gz" $EXCL portable/
          echo "Full package: $(du -h PocketClaw-v${VERSION}-full.tar.gz | cut -f1)"

          # Update package: UI + system scripts only (lightweight)
          tar -czf "PocketClaw-v${VERSION}-update.tar.gz" \
            -C portable app/ui/ system/ version.txt
          echo "Update package: $(du -h PocketClaw-v${VERSION}-update.tar.gz | cut -f1)"

      - name: Create tag and release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          gh release create "$VERSION" \
            --title "PocketClaw $VERSION" \
            --generate-notes \
            PocketClaw-*.tar.gz
