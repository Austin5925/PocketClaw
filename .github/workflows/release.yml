name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install

      - name: Build UI
        working-directory: ui
        run: |
          pnpm typecheck
          pnpm build
          mkdir -p ../portable/app/ui/dist
          cp -R dist/* ../portable/app/ui/dist/

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create update package
        run: |
          cd portable
          tar -czf ../PocketClaw-v${{ steps.version.outputs.version }}-update.tar.gz \
            app/ui/ system/ version.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            PocketClaw-v${{ steps.version.outputs.version }}-update.tar.gz
